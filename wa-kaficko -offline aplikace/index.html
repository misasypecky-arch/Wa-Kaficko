<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
           <h1>☕ Coffee Log</h1>
           <button onclick="showDailySummary()" style="background:none; border:none; color:var(--primary); text-decoration:underline; cursor:pointer;">Zobrazit můj dnešní přehled</button>
        </header>

        <section class="user-section">
            <label for="user-select">Kdo pije?</label>
            <select id="user-select">
                <option value="">Načítání uživatelů...</option>
            </select>
        </section>

        <section id="drinks-container" class="drinks-grid">
            </section>

        <footer>
            <button id="save-btn" class="main-btn">Uložit záznam</button>
        </footer>
    </div>

    <div id="toast" class="toast hidden">Uloženo!</div>

    <script src="script.js"></script>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-title">Titulek</h2>
            <div id="modal-body">Obsah</div>
            <button class="main-btn close-modal-btn" onclick="closeModal()">Zavřít</button>
        </div>
    </div>
</body>
</html>
